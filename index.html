<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Josh Segat | AI-Powered Senior Developer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              black: '#09090B',
              window: '#0D0D0D', // Deeper black for window
              card: '#1A1A1A',   // Slightly lighter for cards
              yellow: '#FFC107',  // Primary accent
              textPrimary: '#FAFAFA',
              textSecondary: '#A1A1AA',
              textTertiary: '#52525B',
              paintRed: '#D946EF',
              paintCyan: '#22D3EE',
              paintYellow: '#FDE047',
              paintOrange: '#8B5CF6',
              codeGray: '#27272A',
            }
          },
          fontFamily: {
            sans: ['"Outfit"', 'sans-serif'],
            mono: ['"Roboto Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: 'Outfit', sans-serif;
      background-color: #050505; /* True black for page background */
    }

    /* Window Container Base */
    .window-frame {
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 100px rgba(255, 193, 7, 0.03);
    }

    /* Custom scrollbars for the contained window */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 193, 7, 0.4);
    }

    /* Shimmer effect for buttons and accents */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .shimmer-text {
      background: linear-gradient(90deg, #FFC107 0%, #FFF 50%, #FFC107 100%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
    }
  </style>
  <script type="importmap">

    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>

</body>

</html>
